- title: "Crystalline phase of the Z-pentomino fluid"
  caption: "The chiral Z-pentominoes admit a remarkable six distinct crystal structures up to translations and rotations, two of which are observed in this grand-canonical Monte Carlo simulation by <a href="https://openscholarship.wustl.edu/etd/30/" target="_blank">Barnes (2010)</a>. [8]"
  image: assets/img/post-transition.png

- image: /assets/img/truncated_square_big.tikz.jpg
  title: "Truncated square tiling as a crystal structure"
  caption: "By fine-tuning the chemical potentials in a mixture of diamonds and octagons on the square lattice, the truncated square tiling may be obtained as a stable crystal structure. [8]"
